version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: civilagent
      POSTGRES_PASSWORD: civilagent
      POSTGRES_DB: civilagent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civilagent"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  bucket-init:
    image: amazon/aws-cli:2.17.4
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./dev:/dev-config:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        aws --endpoint-url=http://localstack:4566 s3 mb s3://civilagent-uploads || true
        aws --endpoint-url=http://localstack:4566 s3api put-bucket-cors \
          --bucket civilagent-uploads \
          --cors-configuration file:///dev-config/s3-bucket-cors.json
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://civilagent:civilagent@postgres:5432/civilagent
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://localstack:4566
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://civilagent:civilagent@postgres:5432/civilagent
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  pgdata:
