    <!--
      That Open + Three import map.

      web-ifc note: the package's `exports` field declares the Node entry
      (web-ifc-api-node.js) under the "node" condition, which esm.sh
      resolves to in its build environment.  That build does not run in
      the browser ("not compiled for this environment" assertion).

      The fix is to (a) externalize web-ifc and @thatopen/fragments from
      the @thatopen/components shim so the bare specifiers reach the
      browser, and (b) map web-ifc directly to the browser ESM entry
      (`web-ifc-api.js`) on jsdelivr, which is paired with the same
      version's .wasm files (loaded by ifc-source-loader.js via
      WASM_PATH).  Both halves of web-ifc must be the SAME version, or
      the JS wrapper's runtime checks against the WASM exports fail.
    -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.js",
          "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.tsl.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
          "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.77/web-ifc-api.js",
          "@thatopen/fragments": "https://esm.sh/@thatopen/fragments@3.4.5?external=three,three/webgpu,three/tsl,web-ifc",
          "@thatopen/components": "https://esm.sh/@thatopen/components@3.4.3?external=three,three/webgpu,three/tsl,web-ifc,@thatopen/fragments"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./js/main.js?v=4"></script>
  </body>
